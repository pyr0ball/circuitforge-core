schema_version: 1
name: cpu-16gb
eviction_timeout_s: 30.0
services:
  ollama:
    max_mb: 0
    priority: 1
    managed:
      type: process
      adopt: true
      exec_path: "/usr/local/bin/ollama"
      args_template: "serve"
      port: 11434
      host_port: 11434
      health_path: /api/tags
  cf-stt:
    max_mb: 0
    priority: 2
    shared: true
    max_concurrent: 1
    backend: moonshine
  cf-tts:
    max_mb: 0
    priority: 2
    shared: true
    max_concurrent: 1
  cf-embed:
    max_mb: 0
    priority: 2
    shared: true
    max_concurrent: 2
    always_on: true
  cf-classify:
    max_mb: 0
    priority: 2
    shared: true
    max_concurrent: 2
    always_on: true
model_size_hints:
  llm_max_params: 3b-q4
  image_gen_max: none

schema_version: 1
name: single-gpu-4gb
vram_total_mb: 4096
eviction_timeout_s: 15.0
services:
  ollama:
    max_mb: 3072
    priority: 1
    managed:
      type: process
      adopt: true
      exec_path: "/usr/local/bin/ollama"
      args_template: "serve"
      port: 11434
      host_port: 11434
      health_path: /api/tags
  cf-vision:
    max_mb: 1024
    priority: 2
    shared: true
    max_concurrent: 1
  cf-stt:
    max_mb: 600
    priority: 2
    shared: true
    max_concurrent: 1
    backend: faster-whisper
  cf-tts:
    max_mb: 512
    priority: 2
    shared: true
    max_concurrent: 1
  comfyui:
    max_mb: 3584
    priority: 4
model_size_hints:
  llm_max_params: 3b
  image_gen_max: sd15-fp8

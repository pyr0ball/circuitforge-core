schema_version: 1
name: single-gpu-24gb
vram_total_mb: 24576
eviction_timeout_s: 10.0
services:
  vllm:
    max_mb: 9000
    priority: 1
    idle_stop_after_s: 600
    managed:
      type: process
      exec_path: "/devl/miniconda3/envs/cf/bin/python"
      args_template: "-m circuitforge_core.resources.inference.llm_server --model /Library/Assets/LLM/vllm/models/{model} --port {port} --gpu-id {gpu_id}"
      port: 8000
      host_port: 8000
      cwd: "/Library/Development/CircuitForge/circuitforge-core"
  ollama:
    max_mb: 18432
    priority: 1
    managed:
      type: process
      adopt: true
      exec_path: "/usr/local/bin/ollama"
      args_template: "serve"
      port: 11434
      host_port: 11434
      health_path: /api/tags
  cf-vision:
    max_mb: 4096
    priority: 2
    shared: true
    max_concurrent: 6
  cf-docuvision:
    max_mb: 8192
    priority: 2
    shared: true
    max_concurrent: 4
    managed:
      type: process
      exec_path: "/devl/miniconda3/envs/cf/bin/python"
      args_template: "-m circuitforge_core.resources.docuvision.app --model /Library/Assets/LLM/docuvision/models/dolphin-v2 --port {port} --gpu-id {gpu_id}"
      port: 8003
      host_port: 8003
      cwd: "/Library/Development/CircuitForge/circuitforge-core"
  cf-stt:
    max_mb: 1200
    priority: 2
    shared: true
    max_concurrent: 4
    backend: parakeet-tdt
  cf-tts:
    max_mb: 1024
    priority: 2
    shared: true
    max_concurrent: 4
  cf-embed:
    max_mb: 512
    priority: 2
    shared: true
    max_concurrent: 8
    always_on: true
  cf-classify:
    max_mb: 512
    priority: 2
    shared: true
    max_concurrent: 8
    always_on: true
  comfyui:
    max_mb: 20480
    priority: 4
model_size_hints:
  llm_max_params: 70b
  image_gen_max: flux-dev-fp16

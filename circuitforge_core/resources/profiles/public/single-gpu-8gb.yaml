schema_version: 1
name: single-gpu-8gb
vram_total_mb: 8192
eviction_timeout_s: 10.0
services:
  vllm:
    max_mb: 5120
    priority: 1
    idle_stop_after_s: 600
    managed:
      type: docker
      image: "vllm/vllm-openai:v0.9.2"
      port: 8000
      host_port: 8000
      command_template: "--model /models/{model} --trust-remote-code --max-model-len {max_model_len} --gpu-memory-utilization {gpu_mem_util} --enforce-eager --max-num-seqs 8"
      volumes:
        - "${VLLM_MODELS_DIR:-/Library/Assets/LLM/vllm/models}:/models"
      runtime: nvidia
      ipc: host
  ollama:
    max_mb: 4096
    priority: 1
  cf-vision:
    max_mb: 2048
    priority: 2
    shared: true
    max_concurrent: 3
  cf-docuvision:
    max_mb: 4096
    priority: 2
    shared: true
    max_concurrent: 2
  cf-stt:
    max_mb: 1200
    priority: 2
    shared: true
    max_concurrent: 2
    backend: parakeet-tdt
  cf-tts:
    max_mb: 1024
    priority: 2
    shared: true
    max_concurrent: 2
  comfyui:
    max_mb: 6144
    priority: 4
    managed:
      type: process
      exec_path: "/opt/miniconda3/envs/comfyui/bin/python"
      args_template: "/opt/ComfyUI/main.py --listen 0.0.0.0 --port {port} --cuda-device {gpu_id}"
      cwd: "/opt/ComfyUI"
      port: 8188
      host_port: 8188
model_size_hints:
  llm_max_params: 8b
  image_gen_max: sdxl-fp8

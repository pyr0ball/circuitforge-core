schema_version: 1
name: single-gpu-8gb
vram_total_mb: 8192
eviction_timeout_s: 10.0
services:
  vllm:
    max_mb: 6500
    priority: 1
    idle_stop_after_s: 600
    managed:
      type: process
      exec_path: "/devl/miniconda3/envs/cf/bin/python"
      args_template: "-m circuitforge_core.resources.inference.llm_server --model /Library/Assets/LLM/vllm/models/{model} --port {port} --gpu-id {gpu_id}"
      port: 8000
      host_port: 8000
      cwd: "/Library/Development/CircuitForge/circuitforge-core"
  ollama:
    max_mb: 4096
    priority: 1
  cf-vision:
    max_mb: 2048
    priority: 2
    shared: true
    max_concurrent: 3
  cf-docuvision:
    max_mb: 4096
    priority: 2
    shared: true
    max_concurrent: 2
  cf-stt:
    max_mb: 1200
    priority: 2
    shared: true
    max_concurrent: 2
    backend: parakeet-tdt
  cf-tts:
    max_mb: 1024
    priority: 2
    shared: true
    max_concurrent: 2
  comfyui:
    max_mb: 6144
    priority: 4
    managed:
      type: process
      exec_path: "/opt/miniconda3/envs/comfyui/bin/python"
      args_template: "/opt/ComfyUI/main.py --listen 0.0.0.0 --port {port} --cuda-device {gpu_id}"
      cwd: "/opt/ComfyUI"
      port: 8188
      host_port: 8188
model_size_hints:
  llm_max_params: 8b
  image_gen_max: sdxl-fp8

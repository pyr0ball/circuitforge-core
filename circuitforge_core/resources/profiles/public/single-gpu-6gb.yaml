schema_version: 1
name: single-gpu-6gb
vram_total_mb: 6144
eviction_timeout_s: 10.0
services:
  vllm:
    max_mb: 4096
    priority: 1
    idle_stop_after_s: 600
    managed:
      type: docker
      image: "vllm/vllm-openai:v0.9.2"
      port: 8000
      host_port: 8000
      command_template: "--model /models/{model} --trust-remote-code --max-model-len {max_model_len} --gpu-memory-utilization {gpu_mem_util} --enforce-eager --max-num-seqs 8"
      volumes:
        - "${VLLM_MODELS_DIR:-/Library/Assets/LLM/vllm/models}:/models"
      runtime: nvidia
      ipc: host
  ollama:
    max_mb: 3584
    priority: 1
  cf-vision:
    max_mb: 1536
    priority: 2
    shared: true
    max_concurrent: 2
  cf-docuvision:
    max_mb: 3072
    priority: 2
    shared: true
    max_concurrent: 1
  cf-stt:
    max_mb: 600
    priority: 2
    shared: true
    max_concurrent: 2
    backend: faster-whisper
  cf-tts:
    max_mb: 768
    priority: 2
    shared: true
    max_concurrent: 1
  comfyui:
    max_mb: 5120
    priority: 4
model_size_hints:
  llm_max_params: 7b
  image_gen_max: sd15

schema_version: 1
name: single-gpu-16gb
vram_total_mb: 16384
eviction_timeout_s: 10.0
services:
  vllm:
    max_mb: 9000
    priority: 1
    idle_stop_after_s: 600
    managed:
      type: process
      exec_path: "/devl/miniconda3/envs/cf/bin/python"
      args_template: "-m circuitforge_core.resources.inference.llm_server --model /Library/Assets/LLM/vllm/models/{model} --port {port} --gpu-id {gpu_id}"
      port: 8000
      host_port: 8000
      cwd: "/Library/Development/CircuitForge/circuitforge-core"
  ollama:
    max_mb: 12288
    priority: 1
  cf-vision:
    max_mb: 3072
    priority: 2
    shared: true
    max_concurrent: 4
  cf-docuvision:
    max_mb: 6144
    priority: 2
    shared: true
    max_concurrent: 3
    managed:
      type: process
      exec_path: "/devl/miniconda3/envs/cf/bin/python"
      args_template: "-m circuitforge_core.resources.docuvision.app --model /Library/Assets/LLM/docuvision/models/dolphin-v2 --port {port} --gpu-id {gpu_id}"
      port: 8003
      host_port: 8003
      cwd: "/Library/Development/CircuitForge/circuitforge-core"
  cf-stt:
    max_mb: 1200
    priority: 2
    shared: true
    max_concurrent: 3
    backend: parakeet-tdt
  cf-tts:
    max_mb: 1024
    priority: 2
    shared: true
    max_concurrent: 3
  cf-embed:
    max_mb: 512
    priority: 2
    shared: true
    max_concurrent: 6
    always_on: true
  cf-classify:
    max_mb: 512
    priority: 2
    shared: true
    max_concurrent: 6
    always_on: true
  comfyui:
    max_mb: 14336
    priority: 4
model_size_hints:
  llm_max_params: 34b
  image_gen_max: flux-dev-fp8
